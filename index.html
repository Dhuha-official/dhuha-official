<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHUHA Official</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins,sans-serif;
background:#0f0f0f;
color:#fff;
}

header{
position:fixed;
width:100%;
top:0;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
}

.logo{
font-family:Cinzel,serif;
font-size:28px;
font-weight:bold;
color:#d4af37;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.65)),url("https://images.unsplash.com/photo-1523398002811-999ca8dec234?auto=format&fit=crop&w=1400&q=80") center/cover;
}

.hero h1{
font-family:Cinzel,serif;
font-size:58px;
}

.hero p{
margin-top:15px;
font-size:18px;
color:#ddd;
}

.btn{
display:inline-block;
margin-top:30px;
padding:15px 35px;
background:#d4af37;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:40px;
}

section{
padding:90px 8%;
}

.title{
font-family:Cinzel;
font-size:38px;
margin-bottom:40px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#1b1b1b;
border-radius:18px;
overflow:hidden;
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card h3{
padding:15px;
}

.card p{
padding:0 15px 20px;
color:#d4af37;
font-weight:bold;
}

footer{
padding:30px;
text-align:center;
background:#111;
color:#999;
}
</style>

</head>

<body>

<header>
<div class="logo">DHUHA</div>

<nav>
<a href="#">Home</a>
<a href="#">Collection</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<div>

<h1>Built With Faith</h1>

<p>Driven With Purpose</p>

<a class="btn" href="#">Explore Collection</a>

</div>

</section>

<section>

<h2 class="title">New Collection</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=800&q=80">
<h3>Oversize Tee</h3>
<p>Rp199.000</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=800&q=80">
<h3>Premium Polo</h3>
<p>Rp249.000</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?auto=format&fit=crop&w=800&q=80">
<h3>Luxury Perfume</h3>
<p>Rp99.000</p>
</div>

</div>

</section>

<footer>

© 2026 DHUHA Official<br>

Built With Faith • Driven With Purpose

</footer>

</body>
  </html>
