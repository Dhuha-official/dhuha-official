<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin - DHUHA</title>

<link rel="stylesheet" href="assets/css/style.css">

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}

header{
    background:#000;
    color:#d4af37;
    padding:20px;
    text-align:center;
}

.container{
    max-width:1100px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:#1b1b1b;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    background:#d4af37;
    color:#000;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #333;
    padding:12px;
    text-align:left;
}

th{
    background:#222;
}
</style>

</head>

<body>

<header>
<h1>DHUHA Admin Dashboard</h1>
</header>

<div class="container">

<div class="card">

<h2>Tambah Produk</h2>

<input type="text" placeholder="Nama Produk">

<input type="number" placeholder="Harga">

<input type="text" placeholder="URL Foto">

<button>Tambah Produk</button>

</div>

<div class="card">

<h2>Daftar Produk</h2>

<table>

<tr>
<th>Produk</th>
<th>Harga</th>
<th>Aksi</th>
</tr>

<tr>
<td>DHUHA Oversize Tee</td>
<td>Rp129.000</td>
<td>Edit | Hapus</td>
</tr>

</table>

</div>

</div>

</body>
</html>
