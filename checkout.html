<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - DHUHA</title>

<link rel="stylesheet" href="assets/css/style.css">

<style>
body{
    margin:0;
    background:#0f0f0f;
    color:#fff;
    font-family:Arial,sans-serif;
}

.container{
    max-width:900px;
    margin:100px auto;
    padding:20px;
}

h1{
    color:#d4af37;
    text-align:center;
}

form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

input, textarea{
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    padding:15px;
    background:#d4af37;
    color:#000;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h1>Checkout</h1>

<form>

<input type="text" placeholder="Nama Lengkap">

<input type="tel" placeholder="Nomor WhatsApp">

<textarea placeholder="Alamat Lengkap"></textarea>

<button type="submit">
Pesan Sekarang
</button>

</form>

</div>

</body>
</html>
