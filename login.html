<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin - DHUHA</title>

<link rel="stylesheet" href="assets/css/style.css">

<style>
body{
margin:0;
background:#0f0f0f;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login{
background:#1b1b1b;
padding:40px;
border-radius:20px;
width:350px;
}

.login h1{
color:#d4af37;
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:15px;
background:#d4af37;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}
</style>

</head>

<body>

<div class="login">

<h1>DHUHA ADMIN</h1>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
