<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - DHUHA</title>

<link rel="stylesheet" href="assets/css/style.css">

<style>

    background:#0f0f0f;
    color:#fff;
    font-family:Arial,sans-serif;
}

.shop{
    padding:120px 8% 80px;
}

.shop h1{
    text-align:center;
    color:#d4af37;
    margin-bottom:40px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

.card{
    background:#1a1a1a;
    border-radius:15px;
    overflow:hidden;
    text-align:center;
    padding-bottom:20px;
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card h3{
    margin:15px 0 10px;
}

.card p{
    color:#d4af37;
    font-size:20px;
}

.btn{
    display:inline-block;
    margin-top:15px;
    padding:12px 30px;
    background:#d4af37;
    color:#000;
    text-decoration:none;
    border-radius:40px;
    font-weight:bold;
}

.back{
    display:inline-block;
    margin-bottom:30px;
    color:#d4af37;
    text-decoration:none;
}
</style>

<section class="shop">

<a href="index.html" class="back">← Kembali ke Home</a>

<h1>SHOP DHUHA</h1>

<div class="products" id="product-list">

</div>

</section>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://yjddkxffzqowrkkoqwth.supabase.co/rest/v1/";
const SUPABASE_KEY = "sb_publishable_hid0DW65Zkt-tLC4o56S9g_JXt4_uCK";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function loadProducts(){

  const { data, error } = await supabaseClient
    .from("products")
    .select("*");

  if(error){
    console.log(error);
    return;
  }

  const list = document.getElementById("product-list");

  data.forEach(product => {

    list.innerHTML += `
      <div class="card">
        <img src="${product.image || ''}">
        <h3>${product.name}</h3>
        <p>Rp${product.price}</p>
        <a href="#" class="btn">Beli</a>
      </div>
    `;

  });

}

loadProducts();

    </script>
</body>
    </html>
